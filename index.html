<!DOCTYPE html>
<html lang="fr">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Agregator - Drag & Drop</title>
   <link rel="stylesheet" href="styles/main.css">
   <link rel="stylesheet" href="styles/widgets.css">
   <!-- SortableJS pour le drag-and-drop -->
   <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
</head>

<body>
   <div class="app-container">
      <!-- Barre d'ajout de flux -->
      <div class="toolbar">
         <input type="text" id="rss-url-input" placeholder="Coller l'URL du flux RSS ici...">
         <button id="add-rss-btn" class="neon-button">Ajouter / Add</button>
      </div>

      <!-- Zone des widgets (drag-and-drop) -->
      <div id="widgets-container" class="widgets-container">
         <!-- Les widgets seront ajoutés ici dynamiquement -->
      </div>
   </div>

   <script src="scripts/rss-parser.js"></script>
   <script src="scripts/widget-manager.js"></script>
   <script src="scripts/drag-and-drop.js"></script>
   <script src="scripts/app.js"></script>
</body>

</html>
